[build]
  command = "chmod +x node_modules/@esbuild/linux-x64/bin/esbuild node_modules/.bin/esbuild node_modules/.bin/vite 2>/dev/null || true && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/tipster/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# WERSJA 1867.9 — każdy bot działa niezależnie.
# To są częstotliwości skanowania, niezależne dla każdego bota.
# BetAI AI i Ograć Buka nie mają cooldownu czasowego.
# Typer Expert jako jedyny ma cooldown 2 h i czeka na rozliczenie
# własnego poprzedniego typu, ponieważ wylicza następną stawkę progresji.

[functions."publish-betai-multisport-ai"]
  schedule = "7 */2 * * *"

[functions."publish-typer-expert"]
  schedule = "27 */2 * * *"

[functions."publish-ograc-buka"]
  schedule = "47 */2 * * *"

# WERSJA 7 / FIX 1870 — BetAI MultiSport AI rozlicza co godzinę.
# Poprzednio działało tylko 4 razy dziennie, więc zakończony mecz mógł długo wisieć jako PENDING.
[functions."settle-live-ai-picks"]
  schedule = "17 * * * *"

# Typer Expert — rozliczanie własnych typów co godzinę.
[functions."settle-typer-expert"]
  schedule = "37 * * * *"

# Ograć Buka — rozliczanie własnych typów co godzinę.
[functions."settle-ograc-buka"]
  schedule = "52 * * * *"
