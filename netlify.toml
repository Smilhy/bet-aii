[build]
  command = "chmod +x node_modules/@esbuild/linux-x64/bin/esbuild node_modules/.bin/esbuild node_modules/.bin/vite 2>/dev/null || true && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# WERSJA 19 — brakujący stary bundle po nowym deployu ma zwrócić 404,
# a nie index.html udający JavaScript. Inline watchdog wtedy pobierze świeżą wersję.
[[redirects]]
  from = "/assets/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/tipster/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


# WERSJA 19 — dokument aplikacji zawsze jest sprawdzany ponownie,
# natomiast pliki z hashem Vite mogą być długo cacheowane.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/tipster/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

# WERSJA 1867.9 — każdy bot działa niezależnie.
# To są częstotliwości skanowania, niezależne dla każdego bota.
# BetAI AI i Ograć Buka nie mają cooldownu czasowego.
# Typer Expert jako jedyny ma cooldown 2 h i czeka na rozliczenie
# własnego poprzedniego typu, ponieważ wylicza następną stawkę progresji.

[functions."publish-betai-multisport-ai"]
  schedule = "7 */2 * * *"

[functions."publish-typer-expert"]
  schedule = "27 */2 * * *"

[functions."publish-ograc-buka"]
  schedule = "47 */2 * * *"

# WERSJA 7 / FIX 1870 — BetAI MultiSport AI rozlicza co godzinę.
# Poprzednio działało tylko 4 razy dziennie, więc zakończony mecz mógł długo wisieć jako PENDING.
[functions."settle-live-ai-picks"]
  schedule = "17 * * * *"

# Typer Expert — rozliczanie własnych typów co godzinę.
[functions."settle-typer-expert"]
  schedule = "37 * * * *"

# Ograć Buka — rozliczanie własnych typów co godzinę.
[functions."settle-ograc-buka"]
  schedule = "52 * * * *"

# WERSJA 13 — AI Prediction: automatyczne rozliczanie historii i skuteczności.
[functions."settle-ai-prediction-history"]
  schedule = "42 * * * *"

# WERSJA 14 — automatyczny zapis predykcji do historii nawet bez otwierania strony.
# Co 2 godziny pobiera najbliższe mecze i zapisuje pierwszy przedmeczowy snapshot.
[functions."capture-ai-predictions"]
  schedule = "12 */2 * * *"
# WERSJA 23 — twardy watchdog dla botów profili.
# Pilnuje minimum 1 typu dziennie dla Typer Expert i Ograć Buka.
# Jeśli normalny value scan nie znajdzie typu, używa awaryjnej selekcji dziennej.
[functions."ai-bot-watchdog"]
  schedule = "9 * * * *"

# Dodatkowy dzienny trigger po porannym rozliczeniu, bez czekania na wejście admina.
[functions."force-daily-bot-tips"]
  schedule = "19 9,15,21 * * *"

[functions."ai-bot-maintenance-background"]
  background = true

# WERSJA 1880 — automatyczny test wzoru presji Over/Under 2.5.
# Skan zapisuje nowe mecze i stawia płaską stawkę 1 j. wyłącznie przy dodatnim EV.
[functions."scheduled-generate-algorithm-picks"]
  schedule = "33 */3 * * *"

# Rozliczenie standardowego rynku po 90 minutach, bez dogrywki i karnych.
[functions."scheduled-settle-algorithm-picks"]
  schedule = "23 * * * *"
