[build]
  command = "rm -rf node_modules && npm install --no-audit --no-fund && (chmod +x ./node_modules/@esbuild/linux-x64/bin/esbuild || true) && node ./node_modules/vite/bin/vite.js build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/tipster/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
