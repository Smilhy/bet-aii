<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <title>Bet+AI — Dashboard</title>

  <script>
    (function(){
      var lastKey = '';
      function betaiApplyScreenProfile(){
        var root = document.documentElement;
        var vw = Math.max(root.clientWidth || 0, window.innerWidth || 0);
        var vh = Math.max(root.clientHeight || 0, window.innerHeight || 0);
        var dpr = Number(window.devicePixelRatio || 1);
        var swCss = Math.max(window.screen && window.screen.width || 0, window.screen && window.screen.height || 0, vw);
        var shCss = Math.min(window.screen && window.screen.width || vw, window.screen && window.screen.height || vh, vh);
        var swReal = Math.round(swCss * dpr);
        var shReal = Math.round(shCss * dpr);
        var maxReal = Math.max(swReal, shReal, vw, vh);
        var minReal = Math.min(swReal || vw, shReal || vh);
        var ratio = vw / Math.max(vh, 1);
        var coarse = false;
        try { coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches; } catch(e) {}

        var device = 'desktop';
        if (coarse && vw <= 900) device = 'phone';
        else if (coarse && vw <= 1366) device = 'tablet';
        else if (vw <= 900) device = 'phone';
        else if (vw <= 1180) device = 'tablet';
        else if (vw <= 1512 && maxReal < 2500) device = 'laptop';

        var resolution = 'fhd';
        if (maxReal < 900 || vw <= 430) resolution = 'phone-small';
        else if (maxReal < 1500 || vw <= 760) resolution = 'phone-hd';
        else if (maxReal < 1900 || vw <= 1180) resolution = 'tablet';
        else if (maxReal < 2350) resolution = 'fhd';
        else if (maxReal < 3300) resolution = 'qhd';
        else if (maxReal < 4600) resolution = 'uhd';
        else if (maxReal < 6500) resolution = '5k';
        else resolution = '8k';
        if (ratio >= 2.05 && vw >= 1700) resolution = 'ultrawide';

        var scaled = false;
        if (resolution === 'qhd' && vw < 2100 && vw >= 1450) scaled = true;
        if (resolution === 'uhd' && vw < 2600 && vw >= 1450) scaled = true;
        if (resolution === 'fhd' && dpr > 1.15 && maxReal >= 2200) { resolution = 'qhd'; scaled = true; }
        if (device === 'phone' || device === 'tablet') scaled = false;

        var profile = resolution + (scaled ? '-scaled' : '');
        var key = [vw, vh, dpr, device, profile].join('|');
        if (key === lastKey) return;
        lastKey = key;

        root.dataset.betaiDevice = device;
        root.dataset.betaiResolution = profile;
        root.dataset.betaiViewport = vw + 'x' + vh;
        root.dataset.betaiScreen = swReal + 'x' + shReal;
        root.dataset.betaiDpr = String(dpr);
        root.style.setProperty('--betai-vwpx', vw + 'px');
        root.style.setProperty('--betai-vhpx', vh + 'px');
        root.style.setProperty('--betai-dpr', String(dpr));
        root.style.setProperty('--betai-ratio', String(ratio.toFixed(4)));

        var names = ['phone','tablet','laptop','desktop','res-phone-small','res-phone-hd','res-tablet','res-fhd','res-qhd','res-qhd-scaled','res-uhd','res-uhd-scaled','res-5k','res-8k','res-ultrawide'];
        names.forEach(function(n){ root.classList.remove('betai-' + n); });
        root.classList.add('betai-' + device);
        root.classList.add('betai-res-' + profile);
      }
      betaiApplyScreenProfile();
      window.addEventListener('resize', betaiApplyScreenProfile, { passive:true });
      window.addEventListener('orientationchange', function(){ setTimeout(betaiApplyScreenProfile, 80); }, { passive:true });
      window.addEventListener('pageshow', betaiApplyScreenProfile, { passive:true });
    })();
  </script>
  <link rel="preload" as="image" href="/auth-brand-470-transparent.png" fetchpriority="high">
  <link rel="preload" as="image" href="/auth-right-484.png" fetchpriority="high">


  </head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
