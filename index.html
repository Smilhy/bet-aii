  <script>
    // WERSJA 29 — stabilny powrót z karty bez twardego przeładowywania.
    // Opera/Chromium potrafi zamrozić kartę w tle. Poprzedni hard-reload po powrocie
    // robił czarny ekran podczas ponownego startu. Teraz normalny powrót tylko pauzuje
    // ciężkie odświeżenia i odblokowuje UI po krótkim oddechu renderera.
    (function () {
      var html = document.documentElement;
      var hiddenAt = document.visibilityState === 'hidden' ? Date.now() : 0;
      var resumeTimer = 0;
      var paintTimer = 0;
      var discardReloadKey = 'betai_discard_reload_v29';

      function now() { return Date.now ? Date.now() : new Date().getTime(); }

      function detectOpera() {
        try {
          var ua = navigator.userAgent || '';
          var brands = (navigator.userAgentData && navigator.userAgentData.brands) || [];
          return /OPR\/|Opera/i.test(ua) || brands.some(function (brand) { return /Opera/i.test(brand.brand || ''); });
        } catch (_) {
          return false;
        }
      }

      if (detectOpera()) {
        html.classList.add('betai-opera-stability-v29');
        window.__BETAI_OPERA_STABILITY_V29__ = true;
      }

      function markHidden() {
        hiddenAt = now();
        html.classList.add('betai-tab-hidden-v29');
        window.__BETAI_PAGE_VISIBLE_V29__ = false;
      }

      function markVisible(reason) {
        var awayMs = hiddenAt ? now() - hiddenAt : 0;
        hiddenAt = 0;
        window.__BETAI_PAGE_VISIBLE_V29__ = true;
        window.__BETAI_LAST_TAB_AWAY_MS_V29__ = awayMs;
        window.__BETAI_TAB_RESUME_UNTIL_V29__ = now() + (awayMs > 5000 ? 4500 : 1800);

        html.classList.remove('betai-tab-hidden-v29');
        html.classList.add('betai-tab-resuming-v29');

        window.clearTimeout(resumeTimer);
        resumeTimer = window.setTimeout(function () {
          html.classList.remove('betai-tab-resuming-v29');
          try { window.dispatchEvent(new CustomEvent('betai:tab-resume-v29', { detail: { reason: reason || 'visible', awayMs: awayMs } })); } catch (_) {}
        }, awayMs > 5000 ? 1400 : 700);

        window.clearTimeout(paintTimer);
        paintTimer = window.setTimeout(function () {
          try { window.dispatchEvent(new Event('resize')); } catch (_) {}
        }, 120);
      }

      window.__BETAI_CAN_RUN_HEAVY_V29__ = function () {
        return document.visibilityState === 'visible' && now() >= Number(window.__BETAI_TAB_RESUME_UNTIL_V29__ || 0);
      };

      window.__BETAI_SCHEDULE_LIGHT_RESUME_V29__ = function (name, fn, delay) {
        if (typeof fn !== 'function') return 0;
        window.__BETAI_RESUME_TASKS_V29__ = window.__BETAI_RESUME_TASKS_V29__ || {};
        var key = String(name || 'task');
        var tasks = window.__BETAI_RESUME_TASKS_V29__;
        if (tasks[key]) window.clearTimeout(tasks[key]);
        var ms = Math.max(250, Number(delay || 1200));
        tasks[key] = window.setTimeout(function () {
          delete tasks[key];
          if (document.visibilityState !== 'visible') return;
          try { fn(); } catch (error) { try { console.warn('[BetAI v29] resume task skipped', key, error); } catch (_) {} }
        }, ms);
        return tasks[key];
      };

      // Tylko prawdziwie odrzucona karta może dostać świeży reload.
      // Zwykłe przejście na Facebooka/inne zakładki NIE przeładowuje strony.
      if (document.wasDiscarded === true) {
        try {
          var last = Number(sessionStorage.getItem(discardReloadKey) || 0) || 0;
          if (!last || now() - last > 15000) {
            sessionStorage.setItem(discardReloadKey, String(now()));
            window.setTimeout(function () { window.location.reload(); }, 0);
          }
        } catch (_) {}
      }

      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'hidden') markHidden();
        else markVisible('visibility');
      });
      window.addEventListener('pagehide', markHidden);
      window.addEventListener('blur', function () { if (document.visibilityState === 'hidden') markHidden(); });
      window.addEventListener('focus', function () { if (document.visibilityState === 'visible') markVisible('focus'); });
      window.addEventListener('pageshow', function (event) { markVisible(event && event.persisted ? 'pageshow-bfcache' : 'pageshow'); });
      document.addEventListener('resume', function () { markVisible('document-resume'); });

      window.addEventListener('error', function (event) {
        var target = event && event.target;
        var tag = target && target.tagName ? String(target.tagName).toUpperCase() : '';
        var assetUrl = String((target && (target.src || target.href)) || '');
        if (tag !== 'SCRIPT' && tag !== 'LINK') return;
        try {
          var parsed = new URL(assetUrl, window.location.href);
          if (parsed.origin === window.location.origin && parsed.pathname.indexOf('/assets/') === 0) {
            window.location.reload();
          }
        } catch (_) {}
      }, true);
    })();
  </script>
<script>
    // WERSJA 1613 — FHD 1920x1080 / 24" AUTO 75%.
    // Mocniejsze wykrywanie: łapie zarówno 1920x1080, jak i ~1536x864 przy skalowaniu Windows.
    (function () {
      try {
        var dpr = window.devicePixelRatio || 1;
        var swCss = window.screen && window.screen.width ? window.screen.width : 0;
        var shCss = window.screen && window.screen.height ? window.screen.height : 0;
        var swPhys = Math.round(swCss * dpr);
        var shPhys = Math.round(shCss * dpr);
        var maxPhys = Math.max(swPhys, shPhys);
        var minPhys = Math.min(swPhys, shPhys);
        var vw = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0, 0);
        var vh = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0, 0);
        var maxView = Math.max(vw, vh);
        var minView = Math.min(vw, vh);
        var touchPoints = navigator.maxTouchPoints || navigator.msMaxTouchPoints || 0;
        var isTouch = touchPoints > 1;
        var manualZoomOut = swCss > 0 && vw > swCss * 1.08;
        var is2k = maxPhys >= 2450 || maxView >= 2200;
        var is1680x1050 = maxPhys >= 1640 && maxPhys <= 1725 && minPhys >= 1010 && minPhys <= 1085;
        var isFhdPhysical = maxPhys >= 1880 && maxPhys <= 1945 && minPhys >= 1030 && minPhys <= 1115;
        var isFhdCss = Math.max(swCss, shCss) >= 1880 && Math.max(swCss, shCss) <= 1945 && Math.min(swCss, shCss) >= 1030 && Math.min(swCss, shCss) <= 1115;
        var isFhdScaledViewport = maxView >= 1500 && maxView <= 1605 && minView >= 760 && minView <= 930;
        var isFhdNativeViewport = maxView >= 1800 && maxView <= 1945 && minView >= 900 && minView <= 1115;
        if (!isTouch && !manualZoomOut && !is2k && !is1680x1050 && (isFhdPhysical || isFhdCss || isFhdScaledViewport || isFhdNativeViewport)) {
          document.documentElement.classList.add('betai-fhd-auto75-v1613');
          document.documentElement.style.setProperty('--betai-fhd-auto75-scale', '0.75');
          document.documentElement.style.setProperty('--betai-fhd-auto75-width', '133.333vw');
          window.__BETAI_FHD_AUTO75_V1613__ = true;
        }
      } catch (e) {}
    })();
  </script>
